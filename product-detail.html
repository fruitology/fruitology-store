<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fruitology.store</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#0f172a;
  color:white;
}

header{
  background:linear-gradient(135deg,#14532d,#f59e0b);
  padding:80px 20px;
  text-align:center;
}

header h1{
  font-size:4rem;
  font-weight:900;
  margin-bottom:20px;
}

header p{
  max-width:800px;
  margin:auto;
  font-size:1.2rem;
}

.container{
  width:90%;
  max-width:1200px;
  margin:auto;
}

.section-title{
  text-align:center;
  margin-bottom:50px;
}

.section-title h2{
  font-size:3rem;
  color:#fbbf24;
}

.products{
  padding:80px 0;
}

.product-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:30px;
</html>
